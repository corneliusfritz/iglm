name: Build Binaries

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.config.os }}
    name: ${{ matrix.config.os }} (R ${{ matrix.config.r }})
    strategy:
      fail-fast: false
      matrix:
        config:
          # Windows
          - {os: windows-latest, r: '4.1'}
          - {os: windows-latest, r: '4.2'}
          - {os: windows-latest, r: '4.3'}
          - {os: windows-latest, r: '4.4'}
          - {os: windows-latest, r: '4.5'}
          - {os: windows-latest, r: '4.6'}
          - {os: windows-latest, r: 'devel'}
          # macOS Intel
          - {os: macos-13, r: '4.1'}
          - {os: macos-13, r: '4.2'}
          - {os: macos-13, r: '4.3'}
          - {os: macos-13, r: '4.4'}
          - {os: macos-13, r: '4.5'}
          - {os: macos-13, r: '4.6'}
          # macOS ARM64
          - {os: macos-latest, r: '4.1'}
          - {os: macos-latest, r: '4.2'}
          - {os: macos-latest, r: '4.3'}
          - {os: macos-latest, r: '4.4'}
          - {os: macos-latest, r: '4.5'}
          - {os: macos-latest, r: '4.6'}
          - {os: macos-latest, r: 'devel'}
          # Ubuntu 20.04 (Focal)
          - {os: ubuntu-20.04, r: '4.1'}
          - {os: ubuntu-20.04, r: '4.2'}
          # Ubuntu 22.04 (Jammy)
          - {os: ubuntu-22.04, r: '4.1'}
          - {os: ubuntu-22.04, r: '4.2'}
          - {os: ubuntu-22.04, r: '4.3'}
          - {os: ubuntu-22.04, r: '4.4'}
          - {os: ubuntu-22.04, r: '4.5'}
          - {os: ubuntu-22.04, r: '4.6'}
          # Ubuntu Latest (24.04 Noble)
          - {os: ubuntu-latest, r: '4.3'}
          - {os: ubuntu-latest, r: '4.4'}
          - {os: ubuntu-latest, r: '4.5'}
          - {os: ubuntu-latest, r: '4.6'}
          - {os: ubuntu-latest, r: 'devel', http-user-agent: 'release'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Pandoc
        uses: r-lib/actions/setup-pandoc@v2

      - name: Set up Fortran compiler (macOS only)
        if: runner.os == 'macOS'
        run: |
          R_VER="${{ matrix.config.r }}"
          ARCH=$(uname -m)
          echo "Setting up Fortran compiler for macOS $ARCH, R $R_VER"
          if [ "$ARCH" = "arm64" ]; then
            if [ "$R_VER" = "4.1" ] || [ "$R_VER" = "4.2" ]; then
              echo "Downloading gfortran 11.0.0 for macOS arm64"
              curl -LO https://mac.r-project.org/tools/gfortran-11.0.0-darwin20-aarch64.tar.gz
              sudo tar -xf gfortran-11.0.0-darwin20-aarch64.tar.gz -C /
            elif [ "$R_VER" = "4.3" ] || [ "$R_VER" = "4.4" ]; then
              echo "Downloading gfortran 12.2 (universal) for macOS"
              curl -LO https://mac.r-project.org/tools/gfortran-12.2-universal.pkg
              sudo installer -pkg gfortran-12.2-universal.pkg -target /
            else
              echo "Downloading gfortran 14.2 (universal) for macOS"
              curl -LO https://mac.r-project.org/tools/gfortran-14.2-universal.pkg
              sudo installer -pkg gfortran-14.2-universal.pkg -target /
            fi
          else
            # Intel macOS (macos-13 runner)
            if [ "$R_VER" = "4.1" ] || [ "$R_VER" = "4.2" ]; then
              echo "Downloading gfortran 8.2 for macOS Intel"
              curl -LO https://mac.r-project.org/tools/gfortran-8.2-big-sur-intel.tar.gz
              sudo tar -xf gfortran-8.2-big-sur-intel.tar.gz -C /
            elif [ "$R_VER" = "4.3" ] || [ "$R_VER" = "4.4" ]; then
              echo "Downloading gfortran 12.2 (universal) for macOS"
              curl -LO https://mac.r-project.org/tools/gfortran-12.2-universal.pkg
              sudo installer -pkg gfortran-12.2-universal.pkg -target /
            else
              echo "Downloading gfortran 14.2 (universal) for macOS"
              curl -LO https://mac.r-project.org/tools/gfortran-14.2-universal.pkg
              sudo installer -pkg gfortran-14.2-universal.pkg -target /
            fi
          fi
        shell: bash


      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      - name: Install dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          dependencies: '"hard"'

      - name: Build Binary Package
        run: |
          R CMD INSTALL . --build
        shell: bash

      - name: Rename and Move Binary Package
        run: |
          shopt -s nullglob
          FILES=(iglm_*.zip iglm_*.tgz iglm_*.tar.gz)
          shopt -u nullglob

          if [ ${#FILES[@]} -eq 0 ]; then
            echo "No built binary package found!"
            exit 1
          fi

          BINARY_FILE="${FILES[0]}"
          echo "Found built binary: $BINARY_FILE"

          if [[ "$BINARY_FILE" == *.tar.gz ]]; then
            EXT="tar.gz"
          elif [[ "$BINARY_FILE" == *.zip ]]; then
            EXT="zip"
          elif [[ "$BINARY_FILE" == *.tgz ]]; then
            EXT="tgz"
          else
            EXT="${BINARY_FILE##*.}"
          fi

          OS="${{ matrix.config.os }}"
          R_VER="${{ matrix.config.r }}"

          UNAME_M=$(uname -m)
          if [ "$UNAME_M" = "arm64" ]; then
            ARCH="aarch64"
          else
            ARCH="x86_64"
          fi

          VERSION=$(grep '^Version:' DESCRIPTION | awk '{print $2}')
          NEW_NAME="iglm_${VERSION}_${OS}_R-${R_VER}_${ARCH}.${EXT}"

          mkdir -p binaries
          cp "$BINARY_FILE" "binaries/$NEW_NAME"
          echo "Saved binary as: binaries/$NEW_NAME"
        shell: bash

      - name: Upload Binary Package Artifact
        uses: actions/upload-artifact@v4
        with:
          name: iglm-${{ matrix.config.os }}-R-${{ matrix.config.r }}
          path: binaries/

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-binaries
          pattern: iglm-*
          merge-multiple: true

      - name: Display downloaded files
        run: ls -R all-binaries

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: all-binaries/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
